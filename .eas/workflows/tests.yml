name: Main Branch Checks

on:
  push:
    branches:
      - main

defaults:
  tools:
    bun: "1.3.10"

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  test:
    name: Run checks
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run unit tests
        run: bun run test
      - name: Check formatting
        run: bunx prettier --check src
      - name: Run lint
        run: bun run lint
      - name: Run typecheck
        run: bunx tsc --noEmit
